refs:
  label: Broken & external references (3.1)
  description: >-
    A two-document OAD that exercises every reference outcome — resolved, type-mismatch, broken, and
    external — so the issue report and warning glyphs have something to show.
self:
  label: Multi-document $self (3.2)
  description: >-
    A clean four-document OAD using OAS 3.2 $self: each document self-identifies, so every
    cross-document reference resolves by identity regardless of where the files are served.
component-refs:
  label: Component-name references (3.2)
  description: >-
    Implicit connections — discriminator mapping values and Security Requirement keys — resolving as
    component names (diamond, double line) or URI-references (asterisk, single line). Use the
    Resolution options to flip the ambiguous “dual” mapping, and to look up the referenced
    document’s names in the entry vs. the local document.
operation-refs:
  label: Operation references (3.2)
  description: >-
    operationRef Links pointing at Operations in every habitat, so each operation-reference advisory
    shows: a clean path target, a webhook and a callback (not directly callable), and component Path
    Items reached by 2 / 1 / 0 paths (ambiguous, fragile, no URL). One Path Item $ref also collides
    with its target on the “summary” field (undefined merge).
operationid:
  label: operationId links (3.2)
  description: >-
    Link Objects resolving an Operation by operationId (an implicit connection, drawn like a
    component name): a unique match, a match in another reachable document, a missing one (broken),
    and a target reachable only by operationId (its document stays unreachable). The remaining Links
    resolve but aren’t cleanly invocable — a Components Path Item reached by 2 / 1 / 0 paths, a
    webhook, and a callback — reusing the operation-target advisories.
dynamicref:
  label: $dynamicRef / $dynamicAnchor (3.1)
  description: >-
    JSON-Schema dynamic references: GenericList's $dynamicRef (#item) points tentatively (dotted)
    only at the $dynamicAnchors that could actually be its runtime resolution — the outermost
    same-named anchor on an entry-rooted path that reaches the ref. The entry uses StrictList and
    LooseList, which override item and extend GenericList, so both win; GenericList's own default is
    always shadowed (hidden), Unrelated's item can't reach the ref (hidden), and the remote document
    is unreachable (hidden). Plus the two static cases — a $dynamicRef whose local fragment is a
    plain $anchor (resolves like $ref), and a $ref landing on a $dynamicAnchor (treated like
    $anchor) — and a broken $dynamicRef.
recursiveref:
  label: $recursiveRef / $recursiveAnchor (2019-09)
  description: >-
    draft-2019-09 recursive references — the anonymous form of $dynamicRef. GenericTree's
    $recursiveRef (#) fans out tentatively (dotted) to the outermost $recursiveAnchor: true
    resources on an entry-rooted path: StrictTree and LooseTree, which both extend GenericTree, so
    both win (GenericTree's own anchor is shadowed). PlainTree declares no $recursiveAnchor, so its
    $recursiveRef is a plain static self-reference. The anonymous anchor has no name, so it can't be
    reached by a $ref fragment at all.
numbered-drafts:
  label: draft-04/06/07 references (3.1)
  description: >-
    The numbered-draft identification model: named anchors come from identifier fragments (not
    $anchor), keywords beside $ref are ignored, and a JSON-Pointer identifier fragment must be the
    schema's own location. Catalog (draft-07) resolves a $ref to an $id-fragment anchor, warns on an
    ignored-sibling $ref and a mis-pointed $id, and breaks where it leans on a non-existent $anchor;
    Draft04 (draft-04) does the same but with the un-prefixed `id` keyword; Modern re-declares
    2020-12, where $anchor still resolves.
dialects:
  label: Mixed Schema-Object dialects (3.1)
  description: >-
    Per-resource validation: each Schema Object is checked against the dialect it declares — the OAS
    dialect, JSON Schema 2020-12, or draft-07. The viewer only resolves references for the OAS
    dialect and 2020-12, so the draft-07 schema's $schema row carries a ⚠ (with a detail-panel note)
    even though it still validates.
jsonschema:
  label: Standalone JSON Schema (2020-12)
  description: >-
    A single document whose root is a Schema Object, not an OpenAPI Object — detected by its
    $id/$schema and rendered as a Schema Object tree. Its header shows the JSON Schema dialect
    (2020-12) rather than an OAS version, and its three internal references all resolve: a recursive
    self-reference to the document root (#), a JSON-Pointer ref into $defs, and a plain-name $anchor
    reference.
fragment:
  label: Document fragments — Path Item & Schema (3.0)
  description: >-
    A 3.0 OAD split into fragments (the common 3.0 style): pet-pathitem-3.0.yaml is a bare Path Item
    Object and pet-schema-3.0.yaml is a bare Schema Object (3.0 schemas have no
    openapi/$id/$schema). Each is typed from the reference pointing at its root, so their headers
    read “Fragment · Path Item Object” and “Fragment · Schema Object”; the entry and the Path Item
    fragment both reference the shared schema. (This demo sets fragment loading to “referenced by
    the root”.)
fragment-interior:
  label: Document fragment — interior references (3.0)
  description: >-
    A reusable Components Object as a document fragment: schema-lib-3.0.yaml holds “schemas” and
    “responses”, but a Components Object can never be the target of a reference, so nothing types
    its root. The entry references three interior nodes (#/schemas/Pet, #/schemas/Error,
    #/responses/PetList), which type just those subtrees — the header reads “Fragment · partially
    typed” and the root stays generic. References inside the fragment (Pet → Error, the PetList
    response → Pet) resolve too. (This demo sets fragment loading to “any”, which interior typing
    requires.)
