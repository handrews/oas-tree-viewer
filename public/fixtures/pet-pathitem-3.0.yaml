# A document FRAGMENT: its root is a Path Item Object (no `openapi`/`$id`/`$schema`), so it loads only
# with fragments enabled. The reference to it from ref-to-fragment-3.0.yaml (a `/pets` slot) types its
# root as a Path Item; its operations reference the shared Pet schema fragment (pet-schema-3.0.yaml).
get:
  operationId: listPets
  summary: List pets
  responses:
    '200':
      description: A list of pets
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: pet-schema-3.0.yaml
post:
  operationId: createPet
  summary: Create a pet
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: pet-schema-3.0.yaml
  responses:
    '201':
      description: Created
