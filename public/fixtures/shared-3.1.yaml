openapi: 3.1.0
info:
  title: Shared Components
  version: 1.0.0
  description: A referenced document in the OAD, holding reusable schemas.
paths: {}
components:
  schemas:
    Pet:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        tag:
          type: string
        category:
          $ref: '#/components/schemas/Category'
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
