openapi: 3.1.0
info:
  title: Mixed Schema-Object dialects
  version: 1.0.0
  description: >
    Each Schema Object is validated against the dialect it declares — the OAS dialect (default),
    standard JSON Schema 2020-12, or another draft. The viewer RESOLVES references for the OAS
    dialect, 2020-12, and draft-06/07; a Schema Object on a dialect it can't resolve (the
    draft-2019-09 "Legacy" below) keeps a ⚠ on its $schema row, with a note in the detail panel. It
    still validates, against draft-2019-09.
paths:
  /pets:
    get:
      operationId: listPets
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Pet' }
components:
  schemas:
    # Default OAS dialect — validated against the OAS dialect, fully resolvable.
    Pet:
      type: object
      properties:
        id: { type: integer }
        tag: { $ref: '#/components/schemas/Tag' }
        plain: { $ref: '#/components/schemas/Plain2020' }
        legacy: { $ref: '#/components/schemas/Legacy' }
    Tag:
      type: object
      properties:
        name: { type: string }
    # An embedded resource on standard JSON Schema 2020-12 — validated against 2020-12, resolvable.
    Plain2020:
      $id: https://example.com/schemas/plain2020
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        value: { type: string }
    # A draft-2019-09 Schema Object — validated against 2019-09, but its reference-resolution rules
    # (`$recursiveRef`/`$recursiveAnchor`) aren't supported, so its $schema row is flagged.
    Legacy:
      $id: https://example.com/schemas/legacy
      $schema: https://json-schema.org/draft/2019-09/schema
      type: object
      properties:
        when: { type: string, format: date-time }
