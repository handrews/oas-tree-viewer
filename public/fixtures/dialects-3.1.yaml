openapi: 3.1.0
info:
  title: Mixed Schema-Object dialects
  version: 1.0.0
  description: >
    Each Schema Object is validated against the dialect it declares — the OAS dialect (default),
    standard JSON Schema 2020-12, or another draft. The viewer RESOLVES references for the OAS
    dialect, 2020-12, 2019-09, and draft-04/06/07; a Schema Object on a dialect it can't resolve (the
    draft-03 "Legacy" below) keeps a ⚠ on its $schema row, with a note in the detail panel. draft-03
    is also too old for the bundled validator, so Legacy is additionally reported as unvalidated.
paths:
  /pets:
    get:
      operationId: listPets
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Pet' }
components:
  schemas:
    # Default OAS dialect — validated against the OAS dialect, fully resolvable.
    Pet:
      type: object
      properties:
        id: { type: integer }
        tag: { $ref: '#/components/schemas/Tag' }
        plain: { $ref: '#/components/schemas/Plain2020' }
        legacy: { $ref: '#/components/schemas/Legacy' }
    Tag:
      type: object
      properties:
        name: { type: string }
    # An embedded resource on standard JSON Schema 2020-12 — validated against 2020-12, resolvable.
    Plain2020:
      $id: https://example.com/schemas/plain2020
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        value: { type: string }
    # A draft-03 Schema Object — too old to be bundled, so it is neither resolved (⚠ on its $schema
    # row, with a detail note) nor validated (reported as an unvalidated Schema Object).
    Legacy:
      $id: https://example.com/schemas/legacy
      $schema: http://json-schema.org/draft-03/schema#
      type: object
      properties:
        when: { type: string, format: date-time }
